# wutils 配置文件模板 / Configuration template
# ============================================================
# 此配置文件用于配置 wutils 各项功能参数
# 所有字段均有默认值，如不配置则使用默认值
# ============================================================

# ============================================================
# 应用基础配置 / Application Basic Configuration
# ============================================================
app:
  # 应用名称 / Application name
  # 类型: string
  # 默认值: "wutils"
  # 说明: 标识当前应用程序的名称
  name: wutils

  # 应用版本 / Application version
  # 类型: string
  # 默认值: "1.0.0"
  # 说明: 当前应用程序的版本号
  version: 1.0.0

  # 调试模式 / Debug mode
  # 类型: boolean
  # 默认值: false
  # 说明: 开启后输出详细调试日志，用于排查问题
  # 取值: true = 开启调试模式, false = 关闭调试模式
  debug: false

# ============================================================
# 日志配置 / Logging Configuration
# ============================================================
logging:
  # 日志级别 / Log level
  # 类型: string
  # 默认值: "info"
  # 说明: 控制日志输出的详细程度
  # 取值选项:
  #   - "debug":   最详细，包含所有调试信息
  #   - "info":    一般信息，常规运行日志（默认）
  #   - "warn":    警告信息
  #   - "error":   错误信息
  #   - "fatal":   致命错误
  level: info

  # 日志格式 / Log format
  # 类型: string
  # 默认值: "json"
  # 说明: 控制日志输出的格式
  # 取值选项:
  #   - "json":     JSON 格式，便于程序解析
  #   - "console": 控制台纯文本格式，便于人工阅读
  #   - "text":     文本格式
  format: json

# ============================================================
# 刷新间隔配置 / Refresh Interval Configuration
# ============================================================

# 配置热刷新间隔（秒）/ Configuration hot-reload interval in seconds
# 类型: integer
# 默认值: 10
# 说明: 定时任务或监控的刷新/检查间隔时间
# 示例: 设置为 10 表示每 10 秒刷新一次配置
refresh: 10

# ============================================================
# 命令配置 / Command Configuration
# ============================================================
cmd:
  # ============================================================
  # DSG (Disk Sleep Guard) 配置
  # 磁盘睡眠守护 / Disk Sleep Guard
  # 功能: 防止外置 HDD 因长时间无访问进入睡眠状态
  # 适用场景: 外接移动硬盘、NAS 存储等需要持续访问的磁盘
  # ============================================================
  dsg:
    # 是否后台并行运行 / Enable background parallel execution
    # 类型: boolean
    # 默认值: true
    # 说明: 是否并行写入多个磁盘
    # 取值: true = 启用并行后台运行, false = 禁用并行
    parallel: true

    # 需要守护的磁盘列表 / List of disks to protect
    # 类型: array of string
    # 默认值: ["E:"]
    # 必填字段 / Required field
    # 说明: 指定需要防止睡眠的磁盘驱动器号
    # 格式: Windows 磁盘驱动器号，如 "D:", "E:", "F:"
    # 注意: 必须至少指定一个磁盘，否则程序无法运行
    # 示例:
    #   - "E:"       # 保护 E 盘
    #   - "F:"       # 保护 F 盘
    disk:
      - E:

    # 写入时间间隔（秒）/ Write timestamp interval in seconds
    # 类型: integer
    # 默认值: 30
    # 说明: 两次写入操作之间的时间间隔
    # 示例: 设置为 30 表示每 30 秒写入一次时间戳
    # 建议: HDD 建议 30-60 秒，SSD 可适当延长
    delay: 30

  # ============================================================
  # OL (Opacity Listener) 配置
  # 窗口透明度监听器 / Window Opacity Listener
  # 功能: 后台持续运行，将指定窗口设置为透明
  # 适用场景: 让文件管理器、设置窗口保持半透明，便于同时查看内容
  # 类似于 BLend 软件，但更自动化、更可配置
  # ============================================================
  ol:
    # 是否后台并行运行 / Enable background parallel execution
    # 类型: boolean
    # 默认值: true
    # 说明: 是否并行检测和设置多个窗口的透明度
    # 取值: true = 启用并行后台运行, false = 禁用并行
    parallel: true

    # 扫描间隔（秒）/ Window scan interval in seconds
    # 类型: integer
    # 默认值: 2
    # 说明: 每次扫描窗口列表的时间间隔
    # 示例: 设置为 2 表示每 2 秒扫描一次窗口
    # 建议: 1-5 秒之间，过短会增加 CPU 占用
    delay: 2

    # 窗口匹配规则列表 / Window matching rules
    # 类型: array of object
    # 默认值: 见下方示例
    # 说明: 配置需要设置透明度的窗口匹配规则
    # 结构: 每个元素包含 title（标题匹配正则）和 opacity（透明度）
    #
    # title 字段说明:
    #   - 支持正则表达式匹配
    #   - ^ 表示从头匹配, $ 表示结尾匹配
    #   - 示例: "^Weidows.*- Microsoft Edge$" 匹配以 "Weidows" 开头 "- Microsoft Edge" 结尾的窗口
    #
    # opacity 字段说明:
    #   - 透明度值，范围 1-255
    #   - 255 = 完全不透明（默认值）
    #   - 200-240 为常用半透明范围
    #   - 建议设置在 200-240 之间比较舒服
    #
    # 使用技巧:
    #   运行 `wutils ol list` 可查看当前所有窗口的标题
    patterns:
      # 第一个匹配模式: XYplorer 文件管理器
      # title: "(XY|xy)plorer" 匹配 XYplorer 或 xyplorer 窗口（不区分大小写）
      # opacity: 200 半透明显示
      - title: "(XY|xy)plorer"
        opacity: 200

      # 第二个匹配模式: Windows 设置窗口
      # title: "设置$" 匹配以"设置"结尾的窗口（正则表达式）
      # opacity: 220 轻微透明
      - title: "设置$"
        opacity: 220

  # ============================================================
  # Buffer 配置 / IO Buffer Configuration
  # 功能: 内存缓冲配置，用于批量写入优化
  # 适用场景: 大量小文件读写、下载、迁移等需要频繁 IO 的操作
  # 原理: 先将数据写入内存缓冲区，达到一定条件后再批量写入磁盘
  #       减少磁盘 IOPS，延长 HDD 寿命，提升写入性能
  # ============================================================
  buffer:
    # 是否启用缓冲 / Enable buffer
    # 类型: boolean
    # 默认值: false
    # 说明: 是否启用内存缓冲功能
    # 取值: true = 启用缓冲, false = 禁用缓冲
    # 适用场景:
    #   - true:  大量小文件写入、下载、迁移等场景
    #   - false: 实时性要求高或小量数据写入
    enable: false

    # 内存缓冲大小（字节）/ Memory buffer size in bytes
    # 类型: integer (int64)
    # 默认值: 67108864 (即 64 MB)
    # 说明: 缓冲区的最大内存使用量
    #
    # 换算参考:
    #   - 33554432  字节 = 32 MB
    #   - 67108864  字节 = 64 MB (默认)
    #   - 134217728 字节 = 128 MB
    #   - 268435456 字节 = 256 MB
    #
    # 建议:
    #   - 32MB:   小文件、低内存机器
    #   - 64MB:   默认值，日常使用
    #   - 128MB: 大文件、高性能需求
    #   - 256MB+: 批量迁移、下载等场景
    #
    # 注意: 此值为单缓冲区大小，不是总内存使用
    memory_limit: 67108864

    # 定时刷盘间隔（秒）/ Forced flush interval in seconds
    # 类型: integer
    # 默认值: 10
    # 说明: 强制刷新缓冲区的时间间隔
    # 示例: 设置为 10 表示每 10 秒强制刷新一次缓冲区
    #
    # 建议:
    #   - 较短间隔 (5-10秒): 减少数据丢失风险，但增加 IO 负载
    #   - 较长间隔 (30秒+): 减少 IO 负载，但增加数据丢失风险
    #
    # 提示: 与 strategy 配合使用效果更佳
    flush_interval: 10

    # 缓冲策略模板 / Buffer strategy preset
    # 类型: string
    # 默认值: "balanced"
    # 说明: 缓冲区刷新策略预设，影响性能和数据安全平衡
    #
    # 取值选项及适用场景:
    #
    #   - "monitoring": 监控模式
    #     特点: 最小化写入频率，30秒刷盘，优先保证数据完整
    #     适用: 数据监控、日志采集、长时间小写入、敏感数据
    #     性能: ★☆☆☆☆ (最低)
    #     安全: ★★★★★ (最高)
    #
    #   - "defrag": 碎片整理模式
    #     特点: 优化顺序写入，排序批量刷盘，减少磁盘碎片
    #     适用: 大文件顺序写入、HDD 碎片整理、大文件拷贝
    #     性能: ★★★★☆ (高)
    #     安全: ★★★★☆ (高)
    #
    #   - "download": 下载模式
    #     特点: 高吞吐量，5秒+128MB阈值刷盘，最大化写入速度
    #     适用: 大文件下载、批量下载、网络拉取
    #     性能: ★★★★★ (最高)
    #     安全: ★★★☆☆ (中)
    #
    #   - "migration": 迁移模式
    #     特点: 平衡读写，256MB+2秒，适合大批量复制
    #     适用: 数据迁移、备份恢复、跨盘拷贝
    #     性能: ★★★★☆ (高)
    #     安全: ★★★★☆ (高)
    #
    #   - "balanced": 平衡模式（默认）
    #     特点: 综合考虑性能和安全性，64MB+10秒
    #     适用: 一般场景，日常使用推荐
    #     性能: ★★★☆☆ (中)
    #     安全: ★★★★☆ (高)
    #
    # 策略模板详细说明:
    #   monitoring: flush_interval=30, memory_limit=67108864, 侧重数据安全
    #   defrag:     flush_interval=20, memory_limit=134217728, 优化磁盘写入顺序
    #   download:   flush_interval=5,  memory_limit=134217728, 最大化吞吐
    #   migration:  flush_interval=2,  memory_limit=268435456, 快速大批量
    #   balanced:   flush_interval=10, memory_limit=67108864, 平衡（默认）
    #
    # 建议选择:
    #   - 高频写入且数据可丢失场景:     download
    #   - 数据安全优先场景:             monitoring
    #   - 大文件整理/拷贝场景:         defrag / migration
    #   - 日常使用/不知道选什么:         balanced（默认）
    strategy: balanced

# ============================================================
# 配置说明 / Configuration Notes
# ============================================================
#
# 1. 本配置文件采用 YAML 格式，请确保 YAML 语法正确
#    (注意: YAML 对缩进敏感，使用空格而非 Tab)
#
# 2. 所有字段均有默认值，不配置则使用默认值
#
# 3. 配置文件通常命名为 wutils.yml，放置在程序运行目录的 config 子目录
#    例如: ./config/wutils.yml
#    用户配置位置: ~/.config/wutils/app.yml
#
# 4. 修改配置后需要重启程序才能生效
#    可运行 `wutils config` 查看当前配置
#
# 5. 首次运行 wutils 后会自动创建用户配置文件
#    运行 `wutils config update` 可更新配置（保留用户设置）
#
# 6. 详细的配置说明和使用教程请查看:
#    https://blog.weidows.tech/post/lang/golang/wutils
#
# ============================================================
# 完整配置示例 / Complete Configuration Example
# ============================================================
#
# app:
#   name: "wutils"
#   version: "1.0.0"
#   debug: false
#
# logging:
#   level: "info"
#   format: "json"
#
# refresh: 10
#
# cmd:
#   dsg:
#     parallel: true
#     disk:
#       - "E:"
#       - "F:"
#     delay: 30
#
#   ol:
#     parallel: true
#     delay: 2
#     patterns:
#       - title: "(XY|xy)plorer"
#         opacity: 200
#       - title: "设置$"
#         opacity: 220
#       - title: "^Weidows.*- Microsoft Edge$"
#         opacity: 230
#
#   buffer:
#     enable: false
#     memory_limit: 67108864
#     flush_interval: 10
#     strategy: "balanced"
#
# ============================================================
