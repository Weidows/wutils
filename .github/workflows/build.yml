on:
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write
  packages: write

jobs:
  # ---- CLI binary (cross-platform) ----
  cli-releases-matrix:
    name: Release CLI Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ linux, windows, darwin ]
        goarch: [ amd64, arm64 ]
    steps:
      - uses: actions/checkout@v4
      - uses: wangyoucao577/go-release-action@v1.55
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: "https://dl.google.com/go/go1.23.0.linux-amd64.tar.gz"
          project_path: ./cmd/wutils
          asset_name: wutils-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          extra_files: README.md config/wutils.yml
          compress_assets: auto
          overwrite: true
          md5sum: true
          build_flags: -buildvcs=false

  # ---- GUI binary (Windows only, requires Wails + Node) ----
  gui-build:
    name: Build GUI Binary (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build frontend
        working-directory: cmd/wutils-gui/frontend
        run: |
          pnpm install
          pnpm run build

      - name: Build GUI binary
        working-directory: cmd/wutils-gui
        run: |
          go mod tidy
          wails build -skipbindings -o wutils-gui-${{ github.ref_name }}.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wutils-gui-windows-amd64
          path: cmd/wutils-gui/build/bin/wutils-gui-*.exe
